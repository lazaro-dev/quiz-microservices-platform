server {
    listen 80;

    location /auth/ {
        proxy_pass http://auth-service:8000/;
    }

    location /quizzes/ {
        proxy_pass http://quiz-service:8000/;
    }

    location /users/ {
        proxy_pass http://user-service:8000/;
    }

    location /stats/ {
        proxy_pass http://stats-service:8000/;
    }
}