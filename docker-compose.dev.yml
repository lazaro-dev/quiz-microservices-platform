version: "3.9"

services:

  gateway:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
    networks:
      - quiz-network

  user-service:
      build: 
        context: ./services/user-service-spring
        dockerfile: Dockerfile.dev
      ports:
        - "8082:8080"
      depends_on:
        - postgres
      networks:
        - quiz-network
      volumes:
      - ./services/user-service-spring:/app
      - ./services/user-service-spring/.m2:/root/.m2

  redis:
    image: redis:7
    networks:
      - quiz-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    networks:
      - quiz-network
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: quiz
    ports:
      - "5432:5432"
    networks:
      - quiz-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    networks:
      - quiz-network
      
networks:
  quiz-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data: